# Plugin coordinates
pluginGroup = io.github.zerlok
# Dev/local placeholder only. The PUBLISHED version is the GitHub Release tag (release.yml passes
# -PpluginVersion=<tag without leading v>). See openspec/specs/release-pipeline.
pluginVersion = 0.0.0-SNAPSHOT

# Target IntelliJ Platform (PyCharm Community). 2024.2 -> build 242.
platformType = PC
platformVersion = 2024.2.5

# Lowest IDE build the plugin supports. Leave untilBuild open so newer IDEs are accepted.
pluginSinceBuild = 242

# Gradle
org.gradle.jvmargs = -Xmx2g -XX:+UseParallelGC
org.gradle.configuration-cache = true
org.gradle.caching = true
kotlin.stdlib.default.dependency = false
