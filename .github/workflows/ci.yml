name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Compile + unit tests. Tests fetch JUnit4 + opentest4j from Maven Central, so do NOT run offline.
      - name: Check
        run: ./gradlew check

      # IntelliJ Plugin Verifier — API compatibility against the target IDE build.
      - name: Verify plugin
        run: ./gradlew verifyPlugin
